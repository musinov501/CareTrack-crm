<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile | CareTrack</title>
    <link rel="stylesheet" href="../dashboard/style.css">
    <link rel="stylesheet" href="../patients/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../css/enhancements.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div class="brand"><h2>CareTrack</h2><p>MRMS • v1.0</p></div>
        </div>
        <nav class="sidebar-nav">
            <a href="../dashboard/index.html" class="nav-item">Dashboard</a>
            <a href="../doctors/index.html" class="nav-item">Doctors</a>
            <a href="../patients/index.html" class="nav-item active">Patients</a>
            <a href="../diagnoses/index.html" class="nav-item">Diagnoses</a>
            <a href="../referrals/index.html" class="nav-item">Referrals</a>
            <a href="../settings/index.html" class="nav-item">Settings</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-block">
                <div class="role-badge" id="userRole">—</div>
                <p class="user-email" id="userEmail">—</p>
                <button class="sign-out" id="signOutBtn">Sign out</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header profile-header">
            <button class="back-link btn-outline" onclick="history.back()">← Back to Patients</button>
            <div class="report-actions">
                <button class="btn-outline" id="printReportBtn">📄 Diagnosis Report</button>
                <button class="btn-primary" id="addDiagFromProfile">+ Add Diagnosis</button>
            </div>
        </header>

        <section class="profile-cards">
            <div class="dash-card profile-main-card">
                <div class="card-inner">
                    <div class="profile-avatar-placeholder">
                        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="profile-info">
                        <h2 id="profName">Loading...</h2>
                        <span class="badge badge-dept" id="profNo">Patient #---</span>
                        <div class="status-tags">
                            <span class="tag tag-available" id="profStatus">● Admitted</span>
                            <span class="tag tag-duty" id="profWard">Ward: —</span>
                            <span class="tag tag-duty" id="profAdmit">Admitted: —</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dash-card feedback-card">
                <h3>Assigned Clinical Lead</h3>
                <div class="feedback-content doctor-block">
                    <img src="" alt="Doctor" class="feebback-avatar" id="docAvatar">
                    <div>
                        <h4 id="docName">—</h4>
                        <div class="stars" id="docDept">—</div>
                        <p id="docPhone" class="doc-phone">—</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="patient-list-section">
            <div class="dash-card table-container">
                <div class="list-header section-pad">
                    <h3>Clinical History & Diagnoses</h3>
                </div>
                <table class="data-table">
                    <thead>
                        <tr><th>Date</th><th>ICD Code</th><th>Description</th><th>Severity</th></tr>
                    </thead>
                    <tbody id="diagTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="patient-list-section">
            <div class="dash-card table-container">
                <div class="list-header section-pad">
                    <h3>Department Referrals</h3>
                    <a href="../referrals/index.html" class="view-all">All referrals →</a>
                </div>
                <table class="data-table">
                    <thead>
                        <tr><th>Date</th><th>Route</th><th>Reason</th><th>Status</th></tr>
                    </thead>
                    <tbody id="referralsTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="../js/shared.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="script.js"></script>
</body>
</html>
