<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnoses | CareTrack</title>
    <link rel="stylesheet" href="../dashboard/style.css">
    <link rel="stylesheet" href="../patients/style.css">
    <link rel="stylesheet" href="../css/enhancements.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div class="brand">
                <h2>CareTrack</h2>
                <p>MRMS • v1.0</p>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="../dashboard/index.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="../doctors/index.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
                Doctors
            </a>
            <a href="../patients/index.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg>
                Patients
            </a>
            <a href="../diagnoses/index.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Diagnoses
            </a>
            <a href="../referrals/index.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Referrals
            </a>
            <a href="../settings/index.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Settings
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-block">
                <div class="role-badge" id="userRole">—</div>
                <p class="user-email" id="userEmail">—</p>
                <button class="sign-out" id="signOutBtn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign out
                </button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <span class="eyebrow">CLINICAL RECORDS</span>
            <h1>Diagnoses</h1>
            <p>Track disease trends and historical medical records.</p>
        </header>

        <div class="page-toolbar">
            <div class="filter-bar">
                <div class="search-input">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="diagSearch" placeholder="Search ICD, disease or patient">
                </div>
                <select id="filterSeverity">
                    <option value="">All severities</option>
                    <option value="Mild">Mild</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Severe">Severe</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
            <button class="btn-primary" id="addDiagBtn">+ New Diagnosis Entry</button>
        </div>
        
        <div class="dash-card table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ICD Code</th>
                        <th>Disease/Diagnosis Name</th>
                        <th>Patient</th>
                        <th>Severity</th>
                        <th>Date Recorded</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="diagTableBody">
                    <!-- Data injected by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal: Add Diagnosis -->
    <div id="diagModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Diagnosis Record</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="diagForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ICD Code</label>
                        <input type="text" id="dCode" placeholder="e.g. I10" required>
                    </div>
                    <div class="form-group">
                        <label>Disease Name</label>
                        <input type="text" id="dName" placeholder="Full name" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Select Patient</label>
                        <select id="diagPatient" required>
                            <!-- Injected by JS -->
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Severity</label>
                        <select id="dSeverity" required>
                            <option value="Mild">Mild</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Severe">Severe</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Record Diagnosis</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/shared.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="script.js"></script>
</body>
</html>
