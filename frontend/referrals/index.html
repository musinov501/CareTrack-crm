<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referrals | CareTrack</title>
    <link rel="stylesheet" href="../dashboard/style.css">
    <link rel="stylesheet" href="../patients/style.css">
    <link rel="stylesheet" href="../css/enhancements.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div class="brand"><h2>CareTrack</h2><p>MRMS • v1.0</p></div>
        </div>
        <nav class="sidebar-nav">
            <a href="../dashboard/index.html" class="nav-item">Dashboard</a>
            <a href="../doctors/index.html" class="nav-item">Doctors</a>
            <a href="../patients/index.html" class="nav-item">Patients</a>
            <a href="../diagnoses/index.html" class="nav-item">Diagnoses</a>
            <a href="index.html" class="nav-item active">Referrals</a>
            <a href="../settings/index.html" class="nav-item">Settings</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-block">
                <div class="role-badge" id="userRole">—</div>
                <p class="user-email" id="userEmail">—</p>
                <button class="sign-out" id="signOutBtn">Sign out</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <span class="eyebrow">CROSS-DEPARTMENT</span>
            <h1>Referral Management</h1>
            <p>Track patient transfers between specialist departments at CareTrack Clinic.</p>
        </header>

        <div class="page-toolbar">
            <div class="filter-bar">
                <div class="search-input">
                    <input type="text" id="refSearch" placeholder="Search patient or reason">
                </div>
                <select id="filterStatus">
                    <option value="">All statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>
            <button class="btn-primary" id="addReferralBtn">+ New Referral</button>
        </div>

        <div class="dash-card table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>From → To</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="referralsTable"></tbody>
            </table>
        </div>
    </main>

    <div id="referralModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Referral</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="referralForm">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Patient</label>
                        <select id="refPatient" required></select>
                    </div>
                    <div class="form-group">
                        <label>From department</label>
                        <select id="refFrom" required>
                            <option value="General Practice">General Practice</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Orthopaedics">Orthopaedics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>To department</label>
                        <select id="refTo" required>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Orthopaedics">Orthopaedics</option>
                            <option value="General Practice">General Practice</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Clinical reason</label>
                        <input type="text" id="refReason" placeholder="Reason for referral" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Status</label>
                        <select id="refStatus">
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approved</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Referral</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/shared.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="script.js"></script>
</body>
</html>
